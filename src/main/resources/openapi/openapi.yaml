openapi: 3.0.3

info:
  title: Spring Boot API Demo
  version: 1.0.0
  description: API REST para Programacion III

servers:
  - url: http://localhost:8080

tags:
  - name: workshop
    description: Endpoints principales del workshop

  - name: simulaciones
    description: Simulaciones financieras

  - name: demo-estado
    description: Demo singleton vs manual

paths:

  /:
    get:
      tags:
        - workshop

      summary: Endpoint principal
      operationId: obtenerMensajePrincipal

      responses:
        '200':
          description: Mensaje principal
          content:
            application/json:
              schema:
                type: string

  /saludos:
    get:
      tags:
        - workshop

      summary: Listar saludos
      operationId: listarSaludos

      responses:
        '200':
          description: Lista de saludos
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

    post:
      tags:
        - workshop

      summary: Crear saludo
      operationId: crearSaludo

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaludoRequest'

      responses:
        '200':
          description: Saludo creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaludoResponse'

  /api/v1/simulaciones/prestamo:
    post:
      tags:
        - simulaciones

      summary: Simular prestamo
      operationId: simularPrestamo

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrestamoRequest'

      responses:
        '200':
          description: Resultado simulacion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrestamoResponse'

  /api/v1/demo/estado/singleton:
    get:
      tags:
        - demo-estado

      summary: Obtener contador singleton
      operationId: obtenerEstadoSingleton

      responses:
        '200':
          description: Valor contador singleton
          content:
            application/json:
              schema:
                type: integer

    post:
      tags:
        - demo-estado

      summary: Incrementar contador singleton
      operationId: incrementarEstadoSingleton

      responses:
        '200':
          description: Nuevo valor singleton
          content:
            application/json:
              schema:
                type: integer

  /api/v1/demo/estado/manual:
    get:
      tags:
        - demo-estado

      summary: Obtener contador manual
      operationId: obtenerEstadoManual

      responses:
        '200':
          description: Valor contador manual
          content:
            application/json:
              schema:
                type: integer

    post:
      tags:
        - demo-estado

      summary: Incrementar contador manual
      operationId: incrementarEstadoManual

      responses:
        '200':
          description: Nuevo valor manual
          content:
            application/json:
              schema:
                type: integer

components:

  schemas:

    SaludoRequest:
      type: object

      properties:
        mensaje:
          type: string

    SaludoResponse:
      type: object

      properties:
        respuesta:
          type: string

    PrestamoRequest:
      type: object

      properties:
        monto:
          type: number
          format: double

        tasaAnual:
          type: number
          format: double

        meses:
          type: integer

    PrestamoResponse:
      type: object

      properties:
        cuotaMensual:
          type: number
          format: double

        interesTotal:
          type: number
          format: double

        totalPagar:
          type: number
          format: double